<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OG Image — Manifesto</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,600;1,600&family=Inter:wght@300&family=JetBrains+Mono:wght@500&family=Amiri:wght@400&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0E1F38;
    font-family: 'Space Grotesk', sans-serif;
    position: relative;
  }

  /* Arch texture */
  .arch-bg {
    position: absolute;
    bottom: -60px;
    right: -60px;
    width: 480px;
    height: 480px;
    pointer-events: none;
  }

  /* Logo + wordmark top-left */
  .top-left {
    position: absolute;
    top: 52px;
    left: 64px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .top-left img {
    height: 40px;
    width: auto;
  }

  /* Main content */
  .content {
    position: absolute;
    top: 50%;
    left: 64px;
    transform: translateY(-52%);
    max-width: 820px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #C4882B;
    margin-bottom: 22px;
  }
  .headline-1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 88px;
    font-weight: 600;
    color: #FAF8F4;
    line-height: 1.0;
    letter-spacing: -0.03em;
  }
  .headline-2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 88px;
    font-weight: 600;
    color: #C4882B;
    font-style: italic;
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 28px;
  }
  .sub {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(250,248,244,0.65);
    line-height: 1.5;
    max-width: 620px;
  }

  /* Bottom-right Arabic */
  .bottom-right {
    position: absolute;
    bottom: 48px;
    right: 64px;
    text-align: right;
  }
  .arabic-sign {
    font-family: 'Amiri', serif;
    font-size: 26px;
    color: rgba(196,136,43,0.75);
    direction: rtl;
  }
</style>
</head>
<body>

  <!-- Arch SVG background texture -->
  <svg class="arch-bg" viewBox="0 0 480 480" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M240 460 C240 460 40 370 40 210 C40 100 130 20 240 20 C350 20 440 100 440 210 C440 370 240 460 240 460Z"
          stroke="#C4882B" stroke-width="1.5" fill="none" opacity="0.12"/>
    <path d="M240 400 C240 400 80 325 80 195 C80 105 155 50 240 50 C325 50 400 105 400 195 C400 325 240 400 240 400Z"
          stroke="#C4882B" stroke-width="1" fill="none" opacity="0.07"/>
  </svg>

  <!-- Top-left: logo -->
  <div class="top-left">
    <img src="mark-white.png" alt="Ramlatech mark" onerror="this.style.display='none'" />
    <span style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:rgba(250,248,244,0.85);letter-spacing:0.02em;">Ramlatech</span>
  </div>

  <!-- Main headline -->
  <div class="content">
    <div class="eyebrow">THE MANIFESTO · V1 · 2026</div>
    <div class="headline-1">Unapologetically</div>
    <div class="headline-2">Palestinian.</div>
    <div class="sub">A declaration of who we are — and who we refuse to become.</div>
  </div>

  <!-- Bottom-right Arabic -->
  <div class="bottom-right">
    <div class="arabic-sign">تحية من القلب 🇵🇸</div>
  </div>

</body>
</html>
